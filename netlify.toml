[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback — serve index.html for every route
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Required for SharedArrayBuffer / Demucs WASM
[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "require-corp"
